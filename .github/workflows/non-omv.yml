
name: Non OMV test scripts

on:
  push:
    branches: [ master, development, experimental, test* ]
  pull_request:
    branches: [ master, development, experimental, test* ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12", "3.13" ]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python  ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version:  ${{ matrix.python-version }}

    - name: Install OMV
      run: |
        pip install git+https://github.com/OpenSourceBrain/osb-model-validation 
        
        pip install 'numpy==2.2.6' # TODO: remove when pynn v0.12 used!
        pip install scipy sympy matplotlib "cython<3.1.0" pandas tables

    - name: Test some scripts
      run: |
        pip install pyneuroml
        omv install PyNN
        ./regenerate.sh
        omv all -V  

    - name: OMV final version info
      run: |
        omv list -V # list installed engines
        env
